<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Dashboard</title>
    <style>
        :root {
            --bg: #0a0c10;
            --panel: #12151c;
            --card: #1a1f2e;
            --accent: #00d4ff;
            --text: #e0e7ff;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: linear-gradient(135deg, var(--bg), #0f1117);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 15px 10px;
        }

        .container { max-width: 1280px; margin: 0 auto; display: none; }

        .auth-card, .panel {
            background: var(--card);
            border-radius: 20px;
            padding: 25px 18px;
            border: 1px solid #334155;
        }

        h1 {
            font-size: 2.2rem;
            text-align: center;
            background: linear-gradient(to right, #60a5fa, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-bar {
            background: var(--panel);
            padding: 14px 18px;
            border-radius: 16px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        @media (min-width: 640px) {
            .form-grid { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
        }

        input, select {
            background: #0f1117;
            border: 1px solid #475569;
            color: white;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
        }

        .btn-action {
            background: linear-gradient(90deg, var(--accent), #3b82f6);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .user-item {
            background: #0f1117;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid #334155;
        }

        @media (min-width: 640px) {
            .user-item { flex-direction: row; align-items: center; justify-content: space-between; }
        }

        .badge {
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-admin { background: #eab30833; color: #fbbf24; }
        .badge-creator { background: #22c55e33; color: #4ade80; }
        .badge-user { background: #64748b33; color: #94a3b8; }

        table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #1e2937; }

        .action-btn {
            padding: 6px 10px;
            margin: 2px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-up { background: #22c55e; color: white; }
        .btn-down { background: #a855f7; color: white; }
        .btn-del { background: #ef4444; color: white; }

        .filter-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0;
        }

        .filter-btn {
            padding: 10px 18px;
            border-radius: 9999px;
            background: #1e2937;
            border: 1px solid #475569;
            color: white;
        }

        .filter-btn.active {
            background: var(--accent);
            color: black;
        }
    </style>
</head>
<body>

    <!-- Login -->
    <div class="auth-card" id="authCard">
        <h1>Creator Hub</h1>
        <form id="authForm" onsubmit="handleAuth(event)">
            <input type="email" id="authEmail" placeholder="E-Mail" required>
            <input type="password" id="authPassword" placeholder="Passwort" required style="margin-top:12px;">
            <button type="submit" class="btn-action" style="margin-top:20px;">Einloggen</button>
        </form>
    </div>

    <!-- Dashboard -->
    <div class="container" id="mainDashboard">
        <div class="user-bar">
            <div><strong id="currentUserText"></strong> <span id="adminBadge" style="background:#eab30833;color:#fbbf24;padding:4px 12px;border-radius:9999px;font-size:0.85rem;display:none;">ADMIN</span></div>
            <button onclick="logout()" style="background:#ef4444;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;">Abmelden</button>
        </div>

        <!-- Nur Admins sehen diesen Bereich -->
        <div class="panel admin-only">
            <h2>Neuen Creator hinzufügen</h2>
            <form id="creatorForm" onsubmit="addCreator(event)" class="form-grid">
                <input type="text" id="name" placeholder="Name" required>
                <select id="tier" required>
                    <option value="1">Stufe 1</option>
                    <option value="2">Stufe 2</option>
                    <option value="3">Stufe 3</option>
                </select>
                <input type="text" id="tiktok" placeholder="TikTok @name" required>
                <input type="text" id="roblox" placeholder="Roblox Name" required>
                <input type="url" id="link" placeholder="Account Link" required>
                <button type="submit" class="btn-action">Hinzufügen</button>
            </form>
        </div>

        <div class="panel admin-only">
            <h2>Registrierte Accounts</h2>
            <ul id="registeredUserList" style="list-style:none;padding:0;"></ul>
        </div>

        <div class="filter-panel">
            <button class="filter-btn active" onclick="setFilter('all')">Alle anzeigen</button>
            <button class="filter-btn" onclick="setFilter('sort')">Nach Stufe sortiert (1→2→3)</button>
        </div>

        <div class="panel">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Stufe</th>
                        <th>TikTok</th>
                        <th>Roblox</th>
                        <th>Link</th>
                        <th class="admin-only">Aktionen</th>
                    </tr>
                </thead>
                <tbody id="creatorTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let creators = JSON.parse(localStorage.getItem('creators')) || [];
        let users = JSON.parse(localStorage.getItem('users')) || [];
        let loggedInUser = JSON.parse(sessionStorage.getItem('user')) || null;
        let currentFilter = 'sort';

        const ADMINS = [
            "jonasterpitz@gmail.com",
            "emdenflopi.kooperation@gmx.de",
            "j.terpitz@icloud.com"
        ];

        function isAdmin(email) {
            return ADMINS.includes((email || "").toLowerCase().trim());
        }

        function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('authEmail').value.trim().toLowerCase();
            const pw = document.getElementById('authPassword').value;

            let user = users.find(u => u.email === email);
            if (!user) {
                user = {email, password: pw, isAdmin: isAdmin(email), role: isAdmin(email) ? "Admin" : "User", banned: false};
                users.push(user);
                localStorage.setItem('users', JSON.stringify(users));
            }

            if (user.password === pw && !user.banned) {
                loggedInUser = user;
                sessionStorage.setItem('user', JSON.stringify(user));
                checkScreenState();
            } else {
                alert("Falsches Passwort oder Account gesperrt!");
            }
        }

        function logout() {
            loggedInUser = null;
            sessionStorage.clear();
            checkScreenState();
        }

        function checkScreenState() {
            if (loggedInUser) {
                document.getElementById('authCard').style.display = "none";
                document.getElementById('mainDashboard').style.display = "block";
                document.getElementById('currentUserText').innerText = loggedInUser.email;
                document.getElementById('adminBadge').style.display = isAdmin(loggedInUser.email) ? "inline" : "none";

                if (isAdmin(loggedInUser.email)) {
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = "block");
                }
                renderUserList();
                renderTable();
            } else {
                document.getElementById('authCard').style.display = "block";
                document.getElementById('mainDashboard').style.display = "none";
            }
        }

        function renderUserList() {
            const list = document.getElementById('registeredUserList');
            list.innerHTML = '';
            users.forEach((user, i) => {
                const canModify = isAdmin(loggedInUser.email) && !isAdmin(user.email);
                const item = document.createElement('li');
                item.className = 'user-item';
                item.innerHTML = `
                    <div>
                        <strong>${user.email}</strong><br>
                        <span class="badge ${user.role === 'Admin' ? 'badge-admin' : user.role === 'Content Creator' ? 'badge-creator' : 'badge-user'}">
                            ${user.role || 'User'}
                        </span>
                    </div>
                    <div>
                        ${canModify ? `
                            <select onchange="changeRole(${i}, this.value)" style="background:#0f1117;color:white;border:1px solid #475569;padding:6px 10px;border-radius:8px;">
                                <option value="User" ${user.role === 'User' ? 'selected' : ''}>User</option>
                                <option value="Content Creator" ${user.role === 'Content Creator' ? 'selected' : ''}>Content Creator</option>
                            </select>
                            <button onclick="toggleBan(${i})" class="action-btn btn-del">${user.banned ? 'Entbannen' : 'Bannen'}</button>
                        ` : ''}
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function changeRole(i, newRole) {
            users[i].role = newRole;
            localStorage.setItem('users', JSON.stringify(users));
            renderUserList();
        }

        function toggleBan(i) {
            if (confirm(users[i].banned ? "Entbannen?" : "Bannen?")) {
                users[i].banned = !users[i].banned;
                localStorage.setItem('users', JSON.stringify(users));
                renderUserList();
            }
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-panel button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderTable();
        }

        function addCreator(e) {
            e.preventDefault();
            if (!isAdmin(loggedInUser.email)) return;
            creators.push({
                name: document.getElementById('name').value.trim(),
                tier: document.getElementById('tier').value,
                tiktok: document.getElementById('tiktok').value.trim(),
                roblox: document.getElementById('roblox').value.trim(),
                link: document.getElementById('link').value.trim()
            });
            localStorage.setItem('creators', JSON.stringify(creators));
            renderTable();
            e.target.reset();
        }

        function changeRank(i, dir) {
            if (!isAdmin(loggedInUser.email)) return;
            let t = parseInt(creators[i].tier);
            if (dir === 'up' && t < 3) creators[i].tier = t + 1;
            if (dir === 'down' && t > 1) creators[i].tier = t - 1;
            localStorage.setItem('creators', JSON.stringify(creators));
            renderTable();
        }

        function deleteCreator(i) {
            if (confirm("Löschen?")) {
                creators.splice(i, 1);
                localStorage.setItem('creators', JSON.stringify(creators));
                renderTable();
            }
        }

        function renderTable() {
            const tbody = document.getElementById('creatorTableBody');
            tbody.innerHTML = '';

            let list = [...creators];
            list.sort((a, b) => parseInt(a.tier) - parseInt(b.tier));

            list.forEach((c, idx) => {
                const realIdx = creators.indexOf(c);
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${c.name}</strong></td>
                    <td><span style="background:rgba(234,179,8,0.2);color:#fbbf24;padding:4px 12px;border-radius:9999px;">Stufe ${c.tier}</span></td>
                    <td>${c.tiktok}</td>
                    <td>${c.roblox}</td>
                    <td><a href="${c.link}" target="_blank" style="color:var(--accent)">Link öffnen</a></td>
                    <td class="admin-only">
                        <button onclick="changeRank(${realIdx}, 'up')" class="action-btn btn-up">▲ Hoch</button>
                        <button onclick="changeRank(${realIdx}, 'down')" class="action-btn btn-down">▼ Runter</button>
                        <button onclick="deleteCreator(${realIdx})" class="action-btn btn-del">Löschen</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        checkScreenState();
    </script>
</body>
</html>
