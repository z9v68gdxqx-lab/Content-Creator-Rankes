<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Dashboard - Admin User-Verwaltung</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --panel-bg: #161920;
            --text-color: #ffffff;
            --text-secondary: #94a3b8;
            --border-color: #1e293b;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --tier-1: #ef4444; 
            --tier-2: #3b82f6; 
            --tier-3: #eab308; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: none;
        }

        .auth-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .auth-card h2 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            text-align: center;
        }

        .auth-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 24px;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-toggle span {
            color: var(--primary-color);
            cursor: pointer;
            font-weight: bold;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-secondary);
        }

        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1e293b;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .btn-logout {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .admin-only {
            display: none;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
        }

        .panel h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #fff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }

        .form-group label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            background-color: #0f1115;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }

        .btn-action {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            padding: 11px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .user-list {
            list-style: none;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .user-item {
            background-color: #0f1115;
            border: 1px solid var(--border-color);
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .filter-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            background-color: #1e293b;
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .filter-btn.active {
            background-color: var(--primary-color);
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #1e293b;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .badge-tier-1 { background-color: rgba(239, 68, 68, 0.15); color: var(--tier-1); }
        .badge-tier-2 { background-color: rgba(59, 130, 246, 0.15); color: var(--tier-2); }
        .badge-tier-3 { background-color: rgba(234, 179, 8, 0.15); color: var(--tier-3); }
        .badge-admin-user { background-color: rgba(234, 179, 8, 0.2); color: var(--tier-3); }
        .badge-normal-user { background-color: rgba(148, 163, 184, 0.15); color: var(--text-secondary); }
        .badge-banned { background-color: rgba(239, 68, 68, 0.2); color: #ef4444; }

        .rank-actions, .user-actions {
            display: flex;
            gap: 5px;
        }

        .btn-rank, .btn-user-action {
            padding: 4px 8px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .btn-up { background-color: #22c55e; color: white; }
        .btn-down { background-color: #a855f7; color: white; }
        .btn-del, .btn-ban { background-color: #ef4444; color: white; }

        .empty-message { text-align: center; color: var(--text-secondary); padding: 30px; font-style: italic; }

        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            font-size: 0.9rem;
            text-align: center;
        }
        .success { background-color: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .error { background-color: rgba(239, 68, 68, 0.2); color: #ef4444; }
    </style>
</head>
<body>

    <!-- AUTH -->
    <div class="auth-card" id="authCard">
        <h2 id="authTitle">Anmelden</h2>
        <p id="authDesc">Logge dich mit deiner echten E-Mail ein.</p>
        
        <form id="authForm" onsubmit="handleAuth(event)">
            <div class="form-group">
                <label for="authEmail">E-Mail Adresse</label>
                <input type="email" id="authEmail" required placeholder="deine@email.de">
            </div>
            <div class="form-group">
                <label for="authPassword">Passwort</label>
                <input type="password" id="authPassword" required placeholder="••••••••" minlength="6">
            </div>
            <button type="submit" class="btn-action" style="width:100%; margin-top:10px;">Einloggen</button>
        </form>

        <div class="auth-toggle" id="authToggleText">
            Noch keinen Account? <span onclick="switchAuthMode(true)">Jetzt registrieren</span>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="container" id="mainDashboard">
        <header>
            <h1>Creator & Admin Netzwerk</h1>
            <p>Übersicht aller verifizierten Content Creator</p>
        </header>

        <div class="user-bar">
            <div>Eingeloggt als: <strong id="currentUserText"></strong> <span id="adminBadge" class="badge badge-admin-user" style="display:none;">ADMIN</span></div>
            <button class="btn-logout" onclick="logout()">Abmelden</button>
        </div>

        <div class="admin-grid admin-only">
            <div class="panel">
                <h2>Neuen Creator hinzufügen</h2>
                <form id="creatorForm" onsubmit="addCreator(event)">
                    <div class="form-grid">
                        <div class="form-group"><label>Name</label><input type="text" id="name" required></div>
                        <div class="form-group"><label>Stufe</label>
                            <select id="tier" required>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                            </select>
                        </div>
                        <div class="form-group"><label>TikTok</label><input type="text" id="tiktok" required></div>
                        <div class="form-group"><label>Roblox</label><input type="text" id="roblox" required></div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Link</label><input type="url" id="link" required>
                        </div>
                        <button type="submit" class="btn-action" style="grid-column: span 2;">Hinzufügen</button>
                    </div>
                </form>
            </div>

            <div class="panel">
                <h2>Registrierte Accounts</h2>
                <ul class="user-list" id="registeredUserList"></ul>
            </div>
        </div>

        <div class="filter-panel">
            <button class="filter-btn active" onclick="setFilter('all')">Alle</button>
            <button class="filter-btn" onclick="setFilter('sort')">Sortiert</button>
            <button class="filter-btn" onclick="setFilter('1')">Stufe 1</button>
            <button class="filter-btn" onclick="setFilter('2')">Stufe 2</button>
            <button class="filter-btn" onclick="setFilter('3')">Stufe 3</button>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Stufe</th>
                        <th>TikTok</th>
                        <th>Roblox</th>
                        <th>Link</th>
                        <th class="admin-only">Aktionen</th>
                    </tr>
                </thead>
                <tbody id="creatorTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let creators = JSON.parse(localStorage.getItem('creators')) || [];
        let users = JSON.parse(localStorage.getItem('users')) || [];
        let loggedInUser = JSON.parse(sessionStorage.getItem('user')) || null;
        let currentFilter = 'all';

        const ADMINS = ["jonasterpitz@gmail.com", "emdenflopi.kooperation@gmx.de", "j.terpitz@icloud.com"];

        function isAdmin(email) {
            return ADMINS.includes((email || "").toLowerCase().trim());
        }

        function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('authEmail').value.trim().toLowerCase();
            const pw = document.getElementById('authPassword').value;

            if (document.getElementById('authTitle').innerText === "Registrieren") {
                if (users.some(u => u.email === email)) return alert("E-Mail bereits vorhanden");
                users.push({email, password: pw, isAdmin: isAdmin(email), banned: false});
                localStorage.setItem('users', JSON.stringify(users));
                alert("Registriert!");
                switchAuthMode(false);
            } else {
                const user = users.find(u => u.email === email && u.password === pw && !u.banned);
                if (user) {
                    loggedInUser = user;
                    sessionStorage.setItem('user', JSON.stringify(user));
                    checkScreenState();
                } else alert("Fehler!");
            }
        }

        function switchAuthMode(toRegister) {
            document.getElementById('authTitle').innerText = toRegister ? "Registrieren" : "Anmelden";
        }

        function logout() {
            loggedInUser = null;
            sessionStorage.clear();
            checkScreenState();
        }

        function checkScreenState() {
            if (loggedInUser) {
                document.getElementById('authCard').style.display = "none";
                document.getElementById('mainDashboard').style.display = "block";
                document.getElementById('currentUserText').innerText = loggedInUser.email;
                document.getElementById('adminBadge').style.display = isAdmin(loggedInUser.email) ? "inline" : "none";
                if (isAdmin(loggedInUser.email)) document.querySelectorAll('.admin-only').forEach(el => el.style.display = "block");
                renderUserList();
                renderTable();
            } else {
                document.getElementById('authCard').style.display = "block";
                document.getElementById('mainDashboard').style.display = "none";
            }
        }

        function renderUserList() {
            const list = document.getElementById('registeredUserList');
            list.innerHTML = '';
            users.forEach((user, i) => {
                const li = document.createElement('li');
                li.className = 'user-item';
                const canBan = isAdmin(loggedInUser.email) && !isAdmin(user.email);
                li.innerHTML = `
                    ${user.email}
                    ${user.banned ? '<span class="badge badge-banned">GEBANNT</span>' : isAdmin(user.email) ? '<span class="badge badge-admin">ADMIN</span>' : ''}
                    ${canBan ? `<button onclick="toggleBan(${i})" class="btn-ban">${user.banned ? 'Entbannen' : 'Bannen'}</button>` : ''}
                `;
                list.appendChild(li);
            });
        }

        function toggleBan(i) {
            users[i].banned = !users[i].banned;
            localStorage.setItem('users', JSON.stringify(users));
            renderUserList();
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderTable();
        }

        function addCreator(e) {
            e.preventDefault();
            if (!isAdmin(loggedInUser.email)) return;
            creators.push({
                name: document.getElementById('name').value,
                tier: document.getElementById('tier').value,
                tiktok: document.getElementById('tiktok').value,
                roblox: document.getElementById('roblox').value,
                link: document.getElementById('link').value
            });
            localStorage.setItem('creators', JSON.stringify(creators));
            renderTable();
            e.target.reset();
        }

        function changeRank(i, dir) {
            if (!isAdmin(loggedInUser.email)) return;
            let t = parseInt(creators[i].tier);
            if (dir === 'up' && t < 3) creators[i].tier = t + 1;
            if (dir === 'down' && t > 1) creators[i].tier = t - 1;
            localStorage.setItem('creators', JSON.stringify(creators));
            renderTable();
        }

        function deleteCreator(i) {
            if (confirm("Löschen?")) {
                creators.splice(i, 1);
                localStorage.setItem('creators', JSON.stringify(creators));
                renderTable();
            }
        }

        function renderTable() {
            const tbody = document.getElementById('creatorTableBody');
            tbody.innerHTML = creators.map((c, i) => `
                <tr>
                    <td>${c.name}</td>
                    <td><span class="badge badge-tier-${c.tier}">Stufe ${c.tier}</span></td>
                    <td>${c.tiktok}</td>
                    <td>${c.roblox}</td>
                    <td><a href="${c.link}" target="_blank">Link</a></td>
                    <td class="admin-only">
                        <button onclick="changeRank(${i}, 'up')" class="btn-rank btn-up">▲</button>
                        <button onclick="changeRank(${i}, 'down')" class="btn-rank btn-down">▼</button>
                        <button onclick="deleteCreator(${i})" class="btn-rank btn-del">Löschen</button>
                    </td>
                </tr>
            `).join('');
        }

        checkScreenState();
    </script>
</body>
</html>
