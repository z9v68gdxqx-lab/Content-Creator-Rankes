<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Dashboard</title>
    <style>
        :root {
            --bg: #0a0c10;
            --panel: #12151c;
            --card: #1a1f2e;
            --accent: #00d4ff;
            --text: #e0e7ff;
            --text2: #a5b4fc;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--bg), #0f1117);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            display: none;
        }

        .auth-card {
            background: var(--card);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
        }

        h1 {
            font-size: 2.8rem;
            background: linear-gradient(to right, #60a5fa, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }

        .user-bar {
            background: var(--panel);
            padding: 16px 24px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border: 1px solid #334155;
        }

        .panel {
            background: var(--panel);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
        }

        input, select {
            background: #0f1117;
            border: 1px solid #475569;
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2);
        }

        .btn-action {
            background: linear-gradient(90deg, var(--accent), #3b82f6);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-action:hover {
            transform: translateY(-2px);
        }

        .user-item {
            background: #0f1117;
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #334155;
            transition: all 0.2s;
        }

        .user-item:hover {
            transform: translateX(6px);
            background: #1e2937;
        }

        .badge {
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-admin { background: #eab30833; color: #fbbf24; }
        .badge-banned { background: #ef444433; color: #f87171; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #1e2937;
            padding: 16px;
            text-align: left;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #334155;
        }

        .rank-actions button {
            padding: 8px 14px;
            margin-right: 6px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .filter-panel button {
            padding: 10px 20px;
            border-radius: 9999px;
            background: #1e2937;
            border: 1px solid #475569;
            color: white;
            transition: all 0.2s;
        }

        .filter-panel button.active,
        .filter-panel button:hover {
            background: var(--accent);
            color: black;
            border-color: var(--accent);
        }

        .message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            border-radius: 12px;
            z-index: 1000;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- Login -->
    <div class="auth-card" id="authCard">
        <h1>Creator Hub</h1>
        <p style="text-align:center; color:var(--text2); margin:20px 0;">Admin Dashboard</p>
        
        <form id="authForm" onsubmit="handleAuth(event)">
            <input type="email" id="authEmail" placeholder="E-Mail Adresse" required>
            <input type="password" id="authPassword" placeholder="Passwort" required style="margin-top:12px;">
            <button type="submit" class="btn-action" style="width:100%; margin-top:20px; font-size:1.1rem;">Einloggen</button>
        </form>

        <p style="text-align:center; margin-top:20px; color:var(--text2);">
            Noch kein Account? <span onclick="switchAuthMode(true)" style="color:var(--accent); cursor:pointer;">Registrieren</span>
        </p>
    </div>

    <!-- Dashboard -->
    <div class="container" id="mainDashboard">
        <div class="user-bar">
            <div style="display:flex; align-items:center; gap:12px;">
                <strong id="currentUserText" style="font-size:1.1rem;"></strong>
                <span id="adminBadge" class="badge badge-admin" style="display:none;">ADMIN</span>
            </div>
            <button class="btn-logout" onclick="logout()">Abmelden</button>
        </div>

        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(380px,1fr)); gap:24px; margin-bottom:30px;">
            <!-- Creator hinzufügen -->
            <div class="panel admin-only">
                <h2 style="margin-bottom:20px; color:var(--accent);">Neuen Creator hinzufügen</h2>
                <form id="creatorForm" onsubmit="addCreator(event)" class="form-grid">
                    <input type="text" id="name" placeholder="Name" required>
                    <select id="tier" required>
                        <option value="1">Stufe 1</option>
                        <option value="2">Stufe 2</option>
                        <option value="3">Stufe 3</option>
                    </select>
                    <input type="text" id="tiktok" placeholder="TikTok @name" required>
                    <input type="text" id="roblox" placeholder="Roblox Name" required>
                    <input type="url" id="link" placeholder="https://..." required style="grid-column: span 2;">
                    <button type="submit" class="btn-action" style="grid-column: span 2; padding:16px;">Creator hinzufügen</button>
                </form>
            </div>

            <!-- Registrierte User -->
            <div class="panel admin-only">
                <h2 style="margin-bottom:20px; color:var(--accent);">Registrierte Accounts</h2>
                <ul id="registeredUserList" style="list-style:none; padding:0;"></ul>
            </div>
        </div>

        <!-- Filter -->
        <div class="filter-panel" style="margin-bottom:20px;">
            <button class="filter-btn active" onclick="setFilter('all')">Alle Creator</button>
            <button class="filter-btn" onclick="setFilter('sort')">Nach Stufe</button>
            <button class="filter-btn" onclick="setFilter('1')">Stufe 1</button>
            <button class="filter-btn" onclick="setFilter('2')">Stufe 2</button>
            <button class="filter-btn" onclick="setFilter('3')">Stufe 3</button>
        </div>

        <!-- Tabelle -->
        <div class="panel">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Stufe</th>
                        <th>TikTok</th>
                        <th>Roblox</th>
                        <th>Link</th>
                        <th class="admin-only">Aktionen</th>
                    </tr>
                </thead>
                <tbody id="creatorTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // === Alle Funktionen (komplett) ===
        let creators = JSON.parse(localStorage.getItem('creators')) || [];
        let users = JSON.parse(localStorage.getItem('users')) || [];
        let loggedInUser = JSON.parse(sessionStorage.getItem('user')) || null;
        let currentFilter = 'all';

        const ADMINS = ["jonasterpitz@gmail.com", "emdenflopi.kooperation@gmx.de", "j.terpitz@icloud.com"];

        function isAdmin(email) {
            return ADMINS.includes((email || "").toLowerCase().trim());
        }

        function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('authEmail').value.trim().toLowerCase();
            const pw = document.getElementById('authPassword').value;

            if (document.getElementById('authTitle').innerText === "Registrieren") {
                if (users.some(u => u.email === email)) return alert("Diese E-Mail existiert bereits!");
                users.push({email, password: pw, isAdmin: isAdmin(email), banned: false});
                localStorage.setItem('users', JSON.stringify(users));
                alert("✅ Registrierung erfolgreich!");
                switchAuthMode(false);
            } else {
                const user = users.find(u => u.email === email && u.password === pw && !u.banned);
                if (user) {
                    loggedInUser = user;
                    sessionStorage.setItem('user', JSON.stringify(user));
                    checkScreenState();
                } else {
                    alert("❌ Falsche Zugangsdaten oder Account gesperrt.");
                }
            }
        }

        function switchAuthMode(toRegister) {
            document.getElementById('authTitle').innerText = toRegister ? "Registrieren" : "Anmelden";
        }

        function logout() {
            loggedInUser = null;
            sessionStorage.clear();
            checkScreenState();
        }

        function checkScreenState() {
            if (loggedInUser) {
                document.getElementById('authCard').style.display = "none";
                document.getElementById('mainDashboard').style.display = "block";
                document.getElementById('currentUserText').innerText = loggedInUser.email;
                document.getElementById('adminBadge').style.display = isAdmin(loggedInUser.email) ? "inline" : "none";
                
                if (isAdmin(loggedInUser.email)) {
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = "block");
                }
                renderUserList();
                renderTable();
            } else {
                document.getElementById('authCard').style.display = "block";
                document.getElementById('mainDashboard').style.display = "none";
            }
        }

        function renderUserList() {
            const list = document.getElementById('registeredUserList');
            list.innerHTML = '';
            users.forEach((user, i) => {
                const canBan = isAdmin(loggedInUser.email) && !isAdmin(user.email);
                const item = document.createElement('li');
                item.className = 'user-item';
                item.innerHTML = `
                    <div>
                        <strong>${user.email}</strong>
                        ${user.banned ? '<span class="badge badge-banned">GEBANNT</span>' : isAdmin(user.email) ? '<span class="badge badge-admin">ADMIN</span>' : ''}
                    </div>
                    ${canBan ? `<button onclick="toggleBan(${i})" class="btn-user-action btn-ban">${user.banned ? 'Entbannen' : 'Bannen'}</button>` : ''}
                `;
                list.appendChild(item);
            });
        }

        function toggleBan(i) {
            if (confirm(users[i].banned ? "Entbannen?" : "Bannen?")) {
                users[i].banned = !users[i].banned;
                localStorage.setItem('users', JSON.stringify(users));
                renderUserList();
            }
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-panel button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderTable();
        }

        function addCreator(e) {
            e.preventDefault();
            if (!isAdmin(loggedInUser.email)) return;
            creators.push({
                name: document.getElementById('name').value.trim(),
                tier: document.getElementById('tier').value,
                tiktok: document.getElementById('tiktok').value.trim(),
                roblox: document.getElementById('roblox').value.trim(),
                link: document.getElementById('link').value.trim()
            });
            localStorage.setItem('creators', JSON.stringify(creators));
            renderTable();
            e.target.reset();
        }

        function changeRank(i, dir) {
            if (!isAdmin(loggedInUser.email)) return;
            let t = parseInt(creators[i].tier);
            if (dir === 'up' && t < 3) creators[i].tier = t + 1;
            if (dir === 'down' && t > 1) creators[i].tier = t - 1;
            localStorage.setItem('creators', JSON.stringify(creators));
            renderTable();
        }

        function deleteCreator(i) {
            if (confirm("Wirklich löschen?")) {
                creators.splice(i, 1);
                localStorage.setItem('creators', JSON.stringify(creators));
                renderTable();
            }
        }

        function renderTable() {
            const tbody = document.getElementById('creatorTableBody');
            tbody.innerHTML = '';

            let list = [...creators];
            if (currentFilter === 'sort') list.sort((a,b) => a.tier - b.tier);
            else if (['1','2','3'].includes(currentFilter)) list = list.filter(c => c.tier === currentFilter);

            list.forEach((c, idx) => {
                const realIdx = creators.indexOf(c);
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${c.name}</strong></td>
                    <td><span class="badge badge-tier-${c.tier}">Stufe ${c.tier}</span></td>
                    <td>${c.tiktok}</td>
                    <td>${c.roblox}</td>
                    <td><a href="${c.link}" target="_blank" style="color:var(--accent)">Öffnen →</a></td>
                    <td class="admin-only">
                        <div class="rank-actions">
                            <button onclick="changeRank(${realIdx}, 'up')" class="btn-rank btn-up">▲ Hoch</button>
                            <button onclick="changeRank(${realIdx}, 'down')" class="btn-rank btn-down">▼ Runter</button>
                            <button onclick="deleteCreator(${realIdx})" class="btn-rank btn-del">Löschen</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        checkScreenState();
    </script>
</body>
</html>
