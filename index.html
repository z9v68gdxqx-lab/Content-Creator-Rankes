<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Dashboard</title>
    <style>
        :root {
            --bg: #0a0c10;
            --panel: #12151c;
            --card: #1a1f2e;
            --accent: #00d4ff;
            --text: #e0e7ff;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: linear-gradient(135deg, var(--bg), #0f1117);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 20px 10px;
        }

        .auth-card, .panel {
            background: var(--card);
            border-radius: 20px;
            padding: 30px 20px;
            border: 1px solid #334155;
        }

        h1 {
            font-size: 2.4rem;
            text-align: center;
            background: linear-gradient(to right, #60a5fa, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input, select {
            background: #0f1117;
            border: 1px solid #475569;
            color: white;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            margin: 8px 0;
        }

        .btn-action {
            background: linear-gradient(90deg, var(--accent), #3b82f6);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .user-bar {
            background: var(--panel);
            padding: 14px 18px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <!-- Login / Register -->
    <div class="auth-card" id="authCard">
        <h1>Creator Hub</h1>
        <p style="text-align:center; margin:20px 0; color:#a5b4fc;" id="authDesc">Logge dich ein oder registriere dich</p>
        
        <form id="authForm" onsubmit="handleAuth(event)">
            <input type="email" id="authEmail" placeholder="E-Mail Adresse" required>
            <input type="password" id="authPassword" placeholder="Passwort" required>
            <button type="submit" class="btn-action" id="authBtn">Einloggen</button>
        </form>

        <p style="text-align:center; margin-top:20px;">
            <span onclick="switchAuthMode()" id="toggleText" style="color:var(--accent); cursor:pointer;">Noch kein Account? Jetzt registrieren</span>
        </p>
    </div>

    <!-- Dashboard -->
    <div class="container" id="mainDashboard">
        <div class="user-bar">
            <div><strong id="currentUserText"></strong> <span id="adminBadge" style="background:#eab30833;color:#fbbf24;padding:4px 12px;border-radius:9999px;font-size:0.8rem;display:none;">ADMIN</span></div>
            <button onclick="logout()" style="background:#ef4444;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;">Abmelden</button>
        </div>

        <div class="panel admin-only">
            <h2 style="margin-bottom:20px;color:var(--accent);">Neuen Creator hinzufügen</h2>
            <form id="creatorForm" onsubmit="addCreator(event)" style="display:grid;grid-template-columns:1fr;gap:12px;">
                <input type="text" id="name" placeholder="Name" required>
                <select id="tier" required>
                    <option value="1">Stufe 1</option>
                    <option value="2">Stufe 2</option>
                    <option value="3">Stufe 3</option>
                </select>
                <input type="text" id="tiktok" placeholder="TikTok @name" required>
                <input type="text" id="roblox" placeholder="Roblox Name" required>
                <input type="url" id="link" placeholder="Account Link" required>
                <button type="submit" class="btn-action">Hinzufügen</button>
            </form>
        </div>

        <div class="panel admin-only">
            <h2 style="margin-bottom:20px;color:var(--accent);">Registrierte Accounts</h2>
            <ul id="registeredUserList" style="list-style:none;padding:0;"></ul>
        </div>

        <div class="panel">
            <table style="width:100%;border-collapse:collapse;">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Stufe</th>
                        <th>TikTok</th>
                        <th>Roblox</th>
                        <th>Link</th>
                        <th class="admin-only">Aktionen</th>
                    </tr>
                </thead>
                <tbody id="creatorTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let creators = JSON.parse(localStorage.getItem('creators')) || [];
        let users = JSON.parse(localStorage.getItem('users')) || [];
        let loggedInUser = JSON.parse(sessionStorage.getItem('user')) || null;
        let isRegisterMode = false;

        const ADMINS = ["jonasterpitz@gmail.com", "emdenflopi.kooperation@gmx.de", "j.terpitz@icloud.com"];

        function isAdmin(email) {
            return ADMINS.includes((email || "").toLowerCase().trim());
        }

        function switchAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('authBtn').innerText = isRegisterMode ? "Registrieren" : "Einloggen";
            document.getElementById('toggleText').innerText = isRegisterMode ? "Bereits registriert? Einloggen" : "Noch kein Account? Jetzt registrieren";
        }

        function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('authEmail').value.trim().toLowerCase();
            const pw = document.getElementById('authPassword').value;

            if (isRegisterMode) {
                if (users.some(u => u.email === email)) return alert("Diese E-Mail ist bereits registriert!");
                const newUser = {email, password: pw, isAdmin: isAdmin(email), banned: false};
                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));
                alert("Registrierung erfolgreich! Du kannst dich jetzt einloggen.");
                isRegisterMode = false;
                switchAuthMode();
            } else {
                const user = users.find(u => u.email === email && u.password === pw && !u.banned);
                if (user) {
                    loggedInUser = user;
                    sessionStorage.setItem('user', JSON.stringify(user));
                    checkScreenState();
                } else {
                    alert("Falsche E-Mail oder Passwort!");
                }
            }
        }

        function logout() {
            loggedInUser = null;
            sessionStorage.clear();
            checkScreenState();
        }

        function checkScreenState() {
            if (loggedInUser) {
                document.getElementById('authCard').style.display = "none";
                document.getElementById('mainDashboard').style.display = "block";
                document.getElementById('currentUserText').innerText = loggedInUser.email;
                document.getElementById('adminBadge').style.display = isAdmin(loggedInUser.email) ? "inline" : "none";

                if (isAdmin(loggedInUser.email)) {
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = "block");
                }
                renderUserList();
                renderTable();
            } else {
                document.getElementById('authCard').style.display = "block";
                document.getElementById('mainDashboard').style.display = "none";
            }
        }

        function renderUserList() {
            const list = document.getElementById('registeredUserList');
            list.innerHTML = '';
            users.forEach((user, i) => {
                const canModify = isAdmin(loggedInUser.email) && !isAdmin(user.email);
                const item = document.createElement('li');
                item.style = "background:#0f1117;padding:14px;border-radius:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;";
                item.innerHTML = `
                    <div><strong>${user.email}</strong></div>
                    ${user.banned ? '<span style="background:#ef444433;color:#f87171;padding:4px 10px;border-radius:9999px;">GEBANNT</span>' : isAdmin(user.email) ? '<span style="background:#eab30833;color:#fbbf24;padding:4px 10px;border-radius:9999px;">ADMIN</span>' : ''}
                    ${canModify ? `<button onclick="toggleBan(${i})" style="background:#ef4444;color:white;border:none;padding:6px 12px;border-radius:8px;">${user.banned ? 'Entbannen' : 'Bannen'}</button>` : ''}
                `;
                list.appendChild(item);
            });
        }

        function toggleBan(i) {
            if (confirm(users[i].banned ? "Entbannen?" : "Bannen?")) {
                users[i].banned = !users[i].banned;
                localStorage.setItem('users', JSON.stringify(users));
                renderUserList();
            }
        }

        function addCreator(e) {
            e.preventDefault();
            if (!isAdmin(loggedInUser.email)) return;
            creators.push({
                name: document.getElementById('name').value.trim(),
                tier: document.getElementById('tier').value,
                tiktok: document.getElementById('tiktok').value.trim(),
                roblox: document.getElementById('roblox').value.trim(),
                link: document.getElementById('link').value.trim()
            });
            localStorage.setItem('creators', JSON.stringify(creators));
            renderTable();
            e.target.reset();
        }

        function changeRank(i, dir) {
            if (!isAdmin(loggedInUser.email)) return;
            let t = parseInt(creators[i].tier);
            if (dir === 'up' && t < 3) creators[i].tier = t + 1;
            if (dir === 'down' && t > 1) creators[i].tier = t - 1;
            localStorage.setItem('creators', JSON.stringify(creators));
            renderTable();
        }

        function deleteCreator(i) {
            if (confirm("Löschen?")) {
                creators.splice(i, 1);
                localStorage.setItem('creators', JSON.stringify(creators));
                renderTable();
            }
        }

        function renderTable() {
            const tbody = document.getElementById('creatorTableBody');
            tbody.innerHTML = creators.map((c, i) => `
                <tr>
                    <td><strong>${c.name}</strong></td>
                    <td><span style="background:rgba(234,179,8,0.2);color:#fbbf24;padding:4px 10px;border-radius:9999px;">Stufe ${c.tier}</span></td>
                    <td>${c.tiktok}</td>
                    <td>${c.roblox}</td>
                    <td><a href="${c.link}" target="_blank" style="color:var(--accent)">Link</a></td>
                    <td class="admin-only">
                        <button onclick="changeRank(${i}, 'up')" class="action-btn btn-up">▲ Hoch</button>
                        <button onclick="changeRank(${i}, 'down')" class="action-btn btn-down">▼ Runter</button>
                        <button onclick="deleteCreator(${i})" class="action-btn btn-del">Löschen</button>
                    </td>
                </tr>
            `).join('');
        }

        checkScreenState();
    </script>
</body>
</html>
